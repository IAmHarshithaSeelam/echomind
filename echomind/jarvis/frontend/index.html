<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EchoMind</title>

<link rel="shortcut icon" href="assets/img/logo1.ico" type="image/x-icon">

<!-- bootstrap-->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
<!--bootstrap icon-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<!-- Particle js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js" type="text/javascript"></script>
<!--textlitte-->
<link rel="stylesheet" href="assets/animate.css">

<link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <section id="Oval" class="mb-4" >
        <div class="row">
            <div class="col-md-1"></div>
            <div class="col-md-10">
                <div class="d-flex justify-content-center align-items-center" style="height:80vh">
                    <canvas id="canvasOne" width="700" height="420 " style="position:absolute"></canvas>
                    <div id="JarvisHood">
                        <div class="square">
                            <span class="circle"></span>
                            <span class="circle"></span>
                            <span class="circle"></span>
                        </div>

                    </div>
                </div>
                <h5 class="text-light text text-center">Ask me anything</h5>
                 <div class="col-md-12 mt-4 pt-4">
                    <div class="text-center">
                        <div id="TextInput" class="d-flex">
                            <input type="text" class="input-field" name="chatbox" id="chatbox" placeholder="type here...">
                            <button id="SendBtn" class=" glow-on-hover"><i class="bi bi-send"></i></button>
                            <button id="MicBtn" class=" glow-on-hover"><i class="bi bi-mic"></i></button>
                            <button id="ChatBtn" class=" glow-on-hover" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"><i class="bi bi-chat-text"></i></button>
                            <button id="SettinsBtn" class=" glow-on-hover"><i class="bi bi-gear"></i></button>
                        </div>
                    </div>
                 </div>
            </div>
            <div class="col-md-1"></div>
        </div>
        </section>

        <section id="SiriWave" class="mb-4" hidden>

            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="d-flex justify-content-center align-items-center "style="height:100vh;">
                            <div class="">
                              <p class="text-start text-light mb-4 siri-message"style="font-size :25px;">Hello,Iam EchoMind</p>
                            
                              <div id="siri-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </section>

    </div>
    

<div class="offcanvas offcanvas-start chat-canvas" data-bs-scroll="true"  data-bs-backdrop="offcanvas" tabindex="-1" id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
   
    <div class="offcanvas-header">
      <h5 class="offcanvas-title text-white"  id="offcanvasScrollingLabel">Chats</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
   </div>

  <div class="offcanvas-body"id="chat-canvas-body">
    <!--chatting code here-->
  </div>
</div>
    <!--jquery-->

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>


    <!--bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
        
    <!--partical-->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js"></script>

    <script src="script.js"></script>

    <!--siriwave-->
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>

    <!--textlitte-->
    <script src="assets/jquery.fittext.js"></script>
    <script src="assets/jquery.lettering.js"></script>
    <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <script src="main.js"></script>
    <script src="controller.js"></script>
    <script src="/eel.js"></script>

</body>

</html>
